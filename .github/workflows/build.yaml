name: build-apk

on:
  workflow_dispatch: # 允许你在 Actions 页面手动点击 "Run workflow" 触发编译
  push:
    branches:
      - main
      - master # 匹配你的主分支名

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive # 必须带上，项目依赖 core 子模块

      - name: Setup Android Fake Signing
        # 核心关键步骤：使用 keytool 生成一个属于你自己的临时签名
        # 绕过原作者因为私有 Secrets 缺失导致的打包必挂问题
        run: |
          keytool -genkey -v -keystore android/app/keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias flclash -storepass 123456 -keypass 123456 -dname "CN=FlClash, OU=FlClash, O=FlClash, L=Local, ST=Local, C=CN"
          echo "keyAlias=flclash" >> android/local.properties
          echo "storePassword=123456" >> android/local.properties
          echo "keyPassword=123456" >> android/local.properties
          echo '{"project_info":{"project_number":"123","project_id":"dummy"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:abc","android_client_info":{"package_name":"com.follow.clash"}},"api_key":[{"current_key":"dummy_key"}]}],"configuration_version":"1"}' > android/app/google-services.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: Get Flutter Dependency
        run: |
          rm -f pubspec.lock
          flutter pub get

      - name: Build APK
        # 直接调用原作者的打包环境脚本，它内部会按顺序编译 Go core 和 Flutter
        run: dart setup.dart android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlClash-Android-APK
          path: ./dist/*.apk
          overwrite: true